name: Release

# Build + distribution-test on every tag, then stage to TestPyPI and PyPI.
#   - Push a tag like `v0.0.3` to run the full pipeline (incl. publishing).
#   - Trigger manually (workflow_dispatch) to build + distribution-test only
#     (the publish jobs are gated on a tag, so a manual run is a safe dry run).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # 1. Build the sdist + wheel ONCE, validate metadata, publish as an artifact
  #    so every downstream job tests the exact same bytes we will upload.
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build

      - name: Check metadata (README rendering, etc.)
        run: twine check dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  # 2. Install the BUILT artifacts (wheel and sdist) in clean envs across the
  #    supported Python matrix, import from outside the source tree, and run the
  #    test suite against the installed package (src layout => `import geope`
  #    resolves to site-packages, not ./src).
  test-install:
    name: Install ${{ matrix.artifact }} on Python ${{ matrix.python-version }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
        artifact: [wheel, sdist]
    steps:
      - uses: actions/checkout@v7          # only for tests/, not for importing

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Install the built ${{ matrix.artifact }}
        run: |
          python -m pip install --upgrade pip
          if [ "${{ matrix.artifact }}" = "wheel" ]; then
            pkg=$(ls dist/*.whl)
          else
            pkg=$(ls dist/*.tar.gz)
          fi
          echo "Installing $pkg"
          python -m pip install "$pkg"
          python -m pip install pytest==9.0.3

      - name: Import smoke test (outside the source tree)
        working-directory: ${{ runner.temp }}
        run: python -c "import geope; print('import OK:', geope.__file__)"

      - name: Run test suite against the installed package
        run: pytest tests/ -v

  # 2b. Execute the example notebooks end-to-end. These are heavy and excluded
  #     from the standard suite (marked `notebooks`, deselected by default via
  #     addopts), so they run via the dedicated reusable workflow.
  test-notebooks:
    name: Execute example notebooks
    uses: ./.github/workflows/notebooks.yml

  # 3. Publish to TestPyPI (trusted publishing — no API token).
  publish-testpypi:
    name: Publish to TestPyPI
    needs: [test-install, test-notebooks]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write                      # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # 4. Verify the freshly-uploaded TestPyPI artifact installs cleanly.
  #    IMPORTANT: dependencies come from real PyPI; only geope comes from
  #    TestPyPI (--no-deps). This avoids the dependency-confusion trap where a
  #    stray higher-versioned dep on TestPyPI shadows the real one.
  verify-testpypi:
    name: Verify install from TestPyPI
    needs: publish-testpypi
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7          # to read version/deps from pyproject

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install deps from PyPI, then geope from TestPyPI (no deps)
        run: |
          python -m pip install --upgrade pip
          VERSION=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          DEPS=$(python -c "import tomllib;print(' '.join(tomllib.load(open('pyproject.toml','rb'))['project']['dependencies']))")
          echo "Installing dependencies from PyPI: $DEPS"
          python -m pip install $DEPS
          echo "Installing geope==$VERSION from TestPyPI (no deps), with retries for propagation"
          for i in 1 2 3 4 5 6; do
            python -m pip install --no-deps --index-url https://test.pypi.org/simple/ "geope==$VERSION" && break
            echo "Not available yet (attempt $i); waiting 15s..."; sleep 15
          done

      - name: Import smoke test
        working-directory: ${{ runner.temp }}
        run: python -c "import geope; print('TestPyPI install OK:', geope.__file__)"

  # 5. Publish to real PyPI — only after everything above is green.
  publish-pypi:
    name: Publish to PyPI
    needs: verify-testpypi
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1   # defaults to real PyPI
