theme:
    font:
        code: Roboto Mono
    name: material
    features:
        - navigation.top
        - navigation.instant
        - navigation.tabs
        - navigation.sections # Sections are included in the navigation on the left.
        - header.autohide # header disappears as you scroll
    palette:
        # Light mode / dark mode
        - scheme: default
          primary: white
          accent: amber
          toggle:
              icon: material/weather-night
              name: Switch to dark mode
        - scheme: slate
          primary: black
          accent: amber
          toggle:
              icon: material/weather-sunny
              name: Switch to light mode
    icon:
        repo: fontawesome/brands/github # GitHub logo in top right
    logo: "_static/geope_logo.png"
    favicon: "_static/geope_logo.png"

site_name: Geodesic Pulse Engineering (GEOPE)
site_description: The documentation for the GEOPE software library.
site_author: Dylan Lewis and Roeland Wiersema
site_url: https://dyylan.github.io/geope

repo_url: https://github.com/dyylan/geope
repo_name: GEOPE
edit_uri: ""

strict: true # Don't allow warnings during the build process

extra_javascript:
    # The below two make MathJax work, see https://squidfunk.github.io/mkdocs-material/reference/mathjax/
    - _static/mathjax.js
    - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
    - _static/custom.css

markdown_extensions:
    - pymdownx.arithmatex: # Render LaTeX via MathJax
          generic: true
    - pymdownx.superfences # Seems to enable syntax highlighting when used with the Material theme.
    - pymdownx.details # Allowing hidden expandable regions denoted by ???
    - pymdownx.snippets: # Include one Markdown file into another
          base_path: docs
    - admonition
    - md_in_html
    - attr_list
    - toc:
          permalink: "¤" # Adds a clickable permalink to each section heading
          toc_depth: 4

plugins:
    - search:
        separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
        # exclude:
            # - "examples/.ipynb_checkpoints/"
    - ipynb
    - hippogriffe:
          extra_public_objects:
              - jax.Array
              - jax.sharding.Mesh
              - jax.sharding.PartitionSpec
              - plt.Figure
              - numpy.ndarray
    - mkdocstrings:
          handlers:
              python:
                  options:
                      force_inspection: true
                      heading_level: 4
                      inherited_members: true
                      members_order: source
                      show_bases: false
                      show_if_no_docstring: true
                      show_overloads: false
                      show_root_heading: true
                      show_signature_annotations: false
                      show_source: false
                      show_symbol_type_heading: true
                      show_symbol_type_toc: true

nav:
    - Home:
        - "index.md"
        - "install.md"
    - User Guide:
        - "user_guide.md"
    - Examples:
        - "examples/getting_started.ipynb"
        - "examples/pulse_smoothing.ipynb"
    - API Reference:
        - "api/index.md"
        - "api/parameters.md"
        - "api/geope.md"
        - "api/gecko.md"
        - "api/engine.md"
        - "api/lie.md"
        # - "api/dexpm.md"
        # - "api/logm.md"
        # - "api/jacobian_manual.md"
        # - "api/pauli_projector.md"
        - "api/utils.md"
