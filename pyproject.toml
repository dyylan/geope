[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "GEOPE"
version = "0.1.0"
requires-python = ">=3.10"
authors = [
    { name = "Dylan Lewis", email = "dlewis3@imperial.ac.uk"},
    { name = "Roeland Wiersema", email = "roel.wier@gmail.com"},
]
dependencies = [
    "jax==0.8.0",
    "optax==0.2.4",
    "matplotlib==3.10.7",
    "numpy==2.3.5",
    "scipy==1.16.3",
    "pandas==2.3.3",
    "bayesian-optimization==2.0.4",
]

[tool.setuptools.packages.find]
where = ["src"]
